name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ---------------------------------------------------------------------------
  # Engine — lint + type-check + tests
  # ---------------------------------------------------------------------------
  engine:
    name: Engine (Python)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: engine

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy . --ignore-missing-imports --exclude tests

      - name: Run tests
        run: pytest

  # ---------------------------------------------------------------------------
  # Telegram bot — lint + tests
  # ---------------------------------------------------------------------------
  telegram-bot:
    name: Telegram Bot (Python)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: telegram-bot

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: telegram-bot/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest

  # ---------------------------------------------------------------------------
  # WhatsApp bot — build TypeScript
  # ---------------------------------------------------------------------------
  whatsapp-bot:
    name: WhatsApp Bot (TypeScript)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: whatsapp-bot

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: whatsapp-bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build
